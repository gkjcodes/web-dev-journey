<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <link rel="stylesheet" href="tble.css">

</head>
<body>
    <table border="2" cellpadding="20"  style="width: 20%; height: 50px; text-align: center;">
        <tr>
            <td colspan="2"> Header</td>
        </tr>
        <tr>
            <td colspan="2"> nav</td>
        </tr>
        <tr>
            <td> section</td> 
            <td rowspan="2"> aside</td>
        </tr>
        <tr>
            <td> article</td>
        </tr>
        <tr>
            <td colspan="2"> footer</td>
        </tr>
    </table>

    <br>
    <br>

    <h1> TH Element Defines Table Headers</h1>

    <table border="2" cellpadding="20" style=" text-align: center;">
        <tr>
            <th> Person 1</th>
            <th> Person 2</th>
            <th> Person 3</th>
        </tr>
        <tr>
            <td> John</td>
            <td> Jane</td>
            <td> Doe</td>
        </tr>
        <tr>
            <td> 25</td>
            <td> 30</td>
            <td> 28</td>
        </tr>
    </table>

</body>
</html>
